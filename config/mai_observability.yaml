# Mai v8 Observability as Code (§8.0)
#
# Console owns the instrumentation ledger schema; this file owns the
# configuration (thresholds, SLOs, dashboards) so that adding a new surface
# is a YAML diff, not a UI click.
#
# Loaded at Console boot by backend/app/config.py::load_mai_observability.
# Compression failures (§4.5) are first-class alerts — surfaced loudly,
# never silent.

version: 1

# §11.5 — brain-phase performance and cost targets. These are the numbers
# the 100-turn Playwright harness flags against. Omnipresence targets are
# intentionally not yet active during the brain phase.
slos:
  first_token_latency_p50_seconds: 2.0
  first_token_latency_p95_seconds: 4.0
  full_turn_cost_p50_usd: 0.10
  full_turn_cost_p95_usd: 0.30
  tool_call_success_rate: 0.95
  chat_history_p50_ms: 100
  compression_success_rate: 0.99
  memory_composition_p95_ms: 200

# Per-surface observability config. Every surface Mai runs on declares its
# alerts, slos, and dashboards here. A new surface added to v8 omnipresence
# ships with its observability block in the same PR.
surfaces:
  console:
    alerts:
      error_rate:
        threshold: 0.02
        window_minutes: 5
        severity: page
      latency_p95_seconds:
        threshold: 4.0
        window_minutes: 10
        severity: warn
      cost_per_turn_p95_usd:
        threshold: 0.30
        window_minutes: 15
        severity: warn
      tool_failure_rate:
        threshold: 0.05
        window_minutes: 10
        severity: warn
      compression_failure:
        threshold: 1
        window_minutes: 1
        severity: page
        note: "§4.5 — first class; never silent"
    slos:
      first_token_latency_seconds:
        p50: 2.0
        p95: 4.0
      full_turn_latency_seconds:
        p50: 5.0
        p95: 12.0
      tool_call_success_rate: 0.95
    dashboards:
      - name: console_usage
        panels: [turns_per_hour, unique_operators, sessions_active]
      - name: console_cost
        panels: [cost_per_turn_p50, cost_per_turn_p95, total_daily_cost]
      - name: console_tools
        panels: [top_tools_by_count, tool_failure_breakdown, tool_latency_p95]
      - name: console_compression
        panels: [compression_attempts, compression_failures, overdue_sessions]

  convergence:
    alerts:
      error_rate:
        threshold: 0.02
        window_minutes: 5
        severity: page
      latency_p95_seconds:
        threshold: 4.0
        window_minutes: 10
        severity: warn
      cost_per_turn_p95_usd:
        threshold: 0.30
        window_minutes: 15
        severity: warn
      tool_failure_rate:
        threshold: 0.05
        window_minutes: 10
        severity: warn
      compression_failure:
        threshold: 1
        window_minutes: 1
        severity: page
        note: "§4.5 — first class; never silent"
    slos:
      first_token_latency_seconds:
        p50: 2.0
        p95: 4.0
      full_turn_latency_seconds:
        p50: 6.0
        p95: 14.0
      tool_call_success_rate: 0.95
    dashboards:
      - name: convergence_usage
        panels: [turns_per_hour, cofa_trigger_count, merge_conflict_count]
      - name: convergence_cost
        panels: [cost_per_turn_p50, cost_per_turn_p95, total_daily_cost]
      - name: convergence_tools
        panels: [top_tools_by_count, write_cofa_mapping_success, tool_latency_p95]
      - name: convergence_compression
        panels: [compression_attempts, compression_failures, overdue_sessions]

# Cost guardrails apply across all surfaces. Breach triggers a page and
# throttles new turns at the Platform chat route per §12.
cost_guardrails:
  daily_total_usd: 50.0
  daily_per_tenant_usd: 10.0
  per_turn_hard_cap_usd: 1.00
